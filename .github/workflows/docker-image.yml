name: Build image

# Builds & pushes the container image to GHCR.
# Image tag mirrors the git ref: push to master -> :master, git tag 1.2.3 -> :1.2.3
on:
  push:
    branches: [master]
    tags: ['*']

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}   # owner/repo (lowercased by metadata-action)

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write        # push to GHCR via the built-in GITHUB_TOKEN
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Optional: pin the bundled CLI by setting a repo variable CLAUDE_VERSION (e.g. 2.1.205).
          build-args: |
            CLAUDE_VERSION=${{ vars.CLAUDE_VERSION || 'latest' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
